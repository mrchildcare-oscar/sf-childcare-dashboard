                                <div style={{fontSize: '11px', color: '#888', fontStyle: 'italic', marginBottom: '6px'}}>Each bar = households with children under 6 in that district, split by income</div>
                                <div className="ami-legend" style={{marginBottom: '10px'}}>
                                    <div className="ami-legend-item"><div className="ami-legend-swatch" style={{background: AMI_COLORS.le110}}></div><span>&le;110% AMI</span></div>
                                    <div className="ami-legend-item"><div className="ami-legend-swatch" style={{background: AMI_COLORS.b110_150}}></div><span>110&ndash;150%</span></div>
                                    <div className="ami-legend-item"><div className="ami-legend-swatch" style={{background: AMI_COLORS.b150_200}}></div><span>150&ndash;200%</span></div>
                                    <div className="ami-legend-item"><div className="ami-legend-swatch" style={{background: AMI_COLORS.gt200}}></div><span>&gt;200%</span></div>
                                </div>
                                <div className="ami-bars-section">
                                    {DEMAND_DATA.map(d => {
                                        const maxVal = Math.max(...DEMAND_DATA.map(x => x.total_hh));
                                        const pct = v => ((v / maxVal) * 100).toFixed(1) + '%';
                                        return <div key={d.district} className="ami-bar-row" style={{marginBottom: '8px'}}>
                                            <div className="ami-bar-label">D{d.district}</div>
                                            <div className="ami-bar-track">
                                                <div className="ami-bar-seg" style={{width: pct(d.le110), background: AMI_COLORS.le110}} title={`\u2264110% AMI: ${d.le110.toLocaleString()} HH with kids <6`}>
                                                    {d.le110 > maxVal * 0.06 ? d.le110.toLocaleString() : ''}
                                                </div>
                                                <div className="ami-bar-seg" style={{width: pct(d.b110_150), background: AMI_COLORS.b110_150}} title={`110-150% AMI: ${d.b110_150.toLocaleString()} HH with kids <6`}>
                                                </div>
                                                <div className="ami-bar-seg" style={{width: pct(d.b150_200), background: AMI_COLORS.b150_200}} title={`150-200% AMI: ${d.b150_200.toLocaleString()} HH with kids <6`}>
                                                </div>
                                                <div className="ami-bar-seg" style={{width: pct(d.gt200), background: AMI_COLORS.gt200, color: '#666'}} title={`>200% AMI: ${d.gt200.toLocaleString()} HH with kids <6`}>
                                                    {d.gt200 > maxVal * 0.06 ? d.gt200.toLocaleString() : ''}
                                                </div>
                                            </div>
                                        </div>;
                                    })}
                                </div>
                                <div className="landscape-footnote" style={{marginBottom: '16px'}}>
                                    ELFA eligibility expands to 200% AMI on July 1, 2026.
                                </div>

                                <div className="care-arrangement" style={{marginBottom: 0}}>
                                    <h4 style={{margin: '0 0 8px', color: '#555', fontSize: '13px', fontWeight: 600}}>How Families Arrange Care</h4>
                                    <ul>
                                        <li>Parent/guardian at home</li>
                                        <li>Family, friend, or neighbor (FFN) care</li>
                                        <li>License-exempt care</li>
                                        <li>Licensed family child care</li>
                                        <li>Licensed centers</li>
                                    </ul>
                                    <div className="context-note">
                                        National estimates (Census NHES) suggest roughly 60% of children under 6 are in some form of regular non-parental care. Licensed care is one of several options.
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* ===== Full-width: Combined table ===== */}
                        <h3>Licensed Supply by District</h3>
                        <div className="landscape-table-wrap">
                            <table className="landscape-table">
                                <thead>
                                    <tr>
                                        <th>District</th>
                                        <th>Licensed Capacity</th>
                                        <th>ELFA Capacity</th>
                                        <th>ELFA %</th>
                                        <th>All Children Under 6</th>
                                        <th>Slots per Child</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {DEMAND_DATA.map(d => {
                                        const supply = supplyByDistrict[d.district] || {};
                                        const under6 = d.under3 + d.age3_4 + d.age5;
                                        const slotsPerChild = under6 > 0 ? (supply.totalCap / under6).toFixed(2) : '-';
                                        const elfaPct = supply.totalCap > 0 ? Math.round((supply.elfaCap || 0) / supply.totalCap * 100) : 0;
                                        return <tr key={d.district}>
                                            <td>District {d.district}</td>
                                            <td>{(supply.totalCap || 0).toLocaleString()}</td>
                                            <td>{(supply.elfaCap || 0).toLocaleString()}</td>
                                            <td>{elfaPct}%</td>
                                            <td>{under6.toLocaleString()}</td>
                                            <td>{slotsPerChild}</td>
                                        </tr>;
                                    })}
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td>Citywide</td>
                                        <td>{(supplyByDistrict.total?.totalCap || 0).toLocaleString()}</td>
                                        <td>{(supplyByDistrict.total?.elfaCap || 0).toLocaleString()}</td>
                                        <td>{supplyByDistrict.total?.totalCap > 0 ? Math.round((supplyByDistrict.total?.elfaCap || 0) / supplyByDistrict.total.totalCap * 100) : 0}%</td>
                                        <td>{demandTotals.under6?.toLocaleString()}</td>
                                        <td>{supplyByDistrict.total?.totalCap && demandTotals.under6 ? (supplyByDistrict.total.totalCap / demandTotals.under6).toFixed(2) : '-'}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                        <div className="landscape-footnote">
                            Not all families seek licensed care. Slots per child compares licensed capacity to the total child population (all incomes, ACS B09001).
                            ELFA % = share of a district's total licensed slots that are ELFA-contracted. Household income data shown separately in the AMI chart above.
                        </div>

                        {/* ===== Full-width: Comparison chart ===== */}
                        <h3>Licensed Supply vs Households with Children Under 6 by District</h3>
                        <div className="landscape-chart-wrap">
                            <div className="chart-subtitle">Eligibility does not equal demand &mdash; not all eligible households seek licensed care</div>
                            <div style={{height: '380px'}}>
                                <canvas ref={landscapeChartRef} className="landscape-chart-canvas"></canvas>
                            </div>
                        </div>
                    </div>
                    {/* ==================== END LANDSCAPE PANEL ==================== */}
                </div>

                </div>

                {modal && (
                    <div className="modal-overlay" onClick={() => setModal(false)}>
                        <div className="modal" onClick={e => e.stopPropagation()}>
                            <div className="modal-header">
                                <h2>Data &amp; Methodology</h2>
                                <button className="modal-close" onClick={() => setModal(false)}>×</button>
                            </div>

                            {tab === 'landscape' && <>
                            <div className="modal-section">
                                <h3>Supply Data</h3>
                                <p><strong>Source:</strong> California Community Care Licensing Division (CCLD) facility data, cross-referenced with SF Department of Early Childhood ELFA program records.</p>
                                <p><strong>Licensed Capacity:</strong> Total slots reported on each facility's license. Includes Day Care Centers, Infant Centers, and Large Family Child Care Homes with status "LICENSED."</p>
                                <p><strong>ELFA Contracted:</strong> Facilities flagged as ELFA-contracted in SFDEC data. ELFA capacity = total licensed capacity of those facilities. Note: not all slots at an ELFA site may be subsidized.</p>
                                <p><strong>Infant/Toddler Slots:</strong> Licensed capacity of facilities classified as "INFANT CENTER" by CCLD. Does not include infant slots within mixed-age centers.</p>
                            </div>
                            <div className="modal-section">
                                <h3>Demand &amp; Population Data</h3>
                                <p><strong>Source:</strong> American Community Survey (ACS) 2020&ndash;2024 5-year estimates at the census tract level, aggregated to SF Supervisor Districts using DataSF boundary files.</p>
                                <p><strong>Children Under 6:</strong> Total child population by age group (under 3, ages 3&ndash;4, age 5) from ACS table B09001. This counts all children in the district regardless of household income. This is a different unit from household counts.</p>
                                <p><strong>Household Income:</strong> Households with children under 6 are derived from ACS S1101: the count of HH with children under 18 (S1101_C01_005E) multiplied by the percentage with children under 6 (S1101_C01_006E + S1101_C01_007E). These are then distributed across AMI bands using B19001 income data and MOHCD 2025 thresholds. These are household counts, not child counts &mdash; a different metric from the child population figures.</p>
                            </div>
                            <div className="modal-section">
                                <h3>AMI Thresholds (MOHCD 2025)</h3>
                                <p>Area Median Income (AMI) is set annually by the Mayor's Office of Housing and Community Development. For a family of four in San Francisco:</p>
                                <p>
                                    <strong>&le;110% AMI:</strong> &le;$167,750 &mdash; ELFA fully funded<br/>
                                    <strong>110&ndash;150% AMI:</strong> $167,751&ndash;$228,750 &mdash; ELFA tuition credit<br/>
                                    <strong>150&ndash;200% AMI:</strong> $228,751&ndash;$305,000 &mdash; ELFA 50% discount (full coverage 7/1/2026)<br/>
                                    <strong>&gt;200% AMI:</strong> &gt;$305,000 &mdash; Market rate
                                </p>
                            </div>
                            <div className="modal-section">
                                <h3>Key Definitions</h3>
                                <p><strong>ELFA (Early Learning for All):</strong> San Francisco's universal early care and education initiative administered by the Department of Early Childhood.</p>
                                <p><strong>AMI (Area Median Income):</strong> Regional income benchmark used to determine eligibility for housing and social programs.</p>
                                <p><strong>FFN (Family, Friend, or Neighbor) Care:</strong> Informal care by relatives, friends, or neighbors &mdash; not tracked in licensing data.</p>
                                <p><strong>Slots per Child:</strong> Licensed capacity divided by child population. A ratio, not an indicator of availability or need. Many families choose non-licensed arrangements.</p>
                            </div>
                            <div className="modal-section">
                                <h3>Limitations &amp; Caveats</h3>
                                <p><strong>Different data sources:</strong> Household counts (ACS S1101) and child population counts (ACS B09001) come from different ACS tables with different survey universes. Household counts measure families; child counts measure individuals. These should not be directly compared as equivalent units.</p>
                                <p><strong>Household variable:</strong> Households with children under 6 are derived from S1101_C01_005E (HH with children under 18) multiplied by the under-6 sub-category percentages (S1101_C01_006E + S1101_C01_007E). AMI band distributions are modeled estimates, not direct survey responses.</p>
                                <p><strong>ACS sampling:</strong> All numbers are sample estimates with margins of error, especially at small geographies like ZCTAs. AMI band assignments are approximate &mdash; actual household eligibility depends on family size and current income.</p>
                                <p><strong>Geography:</strong> District boundaries follow the 2022 redistricting. Data is aggregated from ZCTAs to districts using population-weighted census block intersections.</p>
                                <p><strong>Licensed capacity</strong> reflects what a facility is licensed to serve, not current enrollment or available openings.</p>
                            </div>
                            </>}

                            {tab === 'programs' && <>

                                <h3>Data Limitation</h3>
                                <p>This dashboard includes licensed child care <strong>centers and large Family Child Care (FCC)</strong> facilities from CCLD data. <strong>Small FCCs are not included</strong> as they must be deduced from combining SFDEC and CCLD large FCC data using license numbers.</p>
                                <p><strong>Coverage:</strong><br/>Day Care Centers<br/>Large FCCs<br/>Small FCCs (requires cross-reference)</p>
                            </div>
                            <div className="modal-section">
                                <h3>Location Data</h3>
                                <p>Most facilities have been geocoded to precise addresses. Facilities without street addresses (typically small family child care homes) are displayed using <strong>jittered ZIP code centroids</strong> - approximate locations with small random offsets to prevent stacking.</p>
                                <p><strong>Map Legend:</strong><br/>White-bordered markers: Geocoded addresses<br/>Orange-bordered markers: ZIP-based (jittered)</p>

                                Facilities with ZIP-only locations may be near district borders. Their assigned districts should be verified manually for accuracy. Use the "No District Info" filter to identify these facilities.</p>
